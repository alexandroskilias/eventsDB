<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigs Reviews & Ratings</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        :root { --primary: #3498db; --bg: #f4f7f9; --text: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        h1 { color: var(--primary); text-align: center; }
        .controls { max-width: 1000px; margin: 0 auto 20px auto; display: flex; align-items: center; gap: 15px; }
        input { padding: 12px; flex-grow: 1; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        table { width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #edf2f7; }
        th { background: var(--primary); color: white; cursor: pointer; text-transform: uppercase; font-size: 14px; }
        .event-row { cursor: pointer; transition: background 0.2s; }
        .event-row:hover { background: #f1f9ff; }
        
        /* Details Area */
        .expand-container { display: flex; gap: 30px; padding: 25px; background: #ffffff; animation: slideDown 0.3s ease-out; }
        .image-box { flex: 0 0 350px; cursor: zoom-in; } /* Cursor indicates clickability */
        .event-hero-img { width: 100%; height: auto; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); border: 4px solid white; transition: transform 0.2s; }
        .event-hero-img:hover { transform: scale(1.02); }
        .info-box { flex: 1; }
        .info-box h3 { margin: 0 0 10px 0; color: var(--primary); font-size: 1.1rem; }
        .artist-list { list-style: none; padding: 0; margin: 0 0 20px 0; }
        .artist-list li { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 1.1rem; }
        .venue-text { font-size: 1.1rem; color: #555; line-height: 1.5; }

        /* FULL SCREEN MODAL STYLES */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0; top: 0; 
            width: 100%; height: 100%; 
            background-color: rgba(0,0,0,0.9); 
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .close-modal {
            position: absolute;
            top: 20px; right: 35px;
            color: #fff; font-size: 40px; font-weight: bold;
            cursor: pointer;
        }

        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <h1>Gigs | Reviews | Ratings</h1>

    <div class="controls">
        <input type="text" id="filterInput" placeholder="Search gigs..." onkeyup="filterTable()">
        <div>Entries: <strong id="rowCount">0</strong></div>
    </div>

    <table>
        <thead>
            <tr><th onclick="sortAsc=!sortAsc;loadTable(eventsData)">Date ↕</th><th>Title</th><th>Type</th><th>Rate</th></tr>
        </thead>
        <tbody id="eventTableBody"></tbody>
    </table>

    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="fullImage">
    </div>

    <script src="app.js"></script>
</body>
</html>
